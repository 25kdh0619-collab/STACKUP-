<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STACKUP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <aside id="sidebar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Heptagon (7-sided) outline -->
        <polygon points="12,1 21.2,5.5 24,15.5 18.7,23 5.3,23 0,15.5 2.8,5.5"
          fill="none" stroke="#2563EB" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">STACKUP</span>
    </div>

    <div class="sidebar-section-label">내 공간</div>
    <nav class="space-list" id="space-list"></nav>
    <button class="add-space-btn" id="add-space-btn">+ 공간 추가</button>
  </aside>

  <main id="main">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <polygon points="24,2 42.4,11 48,31 37.4,46 10.6,46 0,31 5.6,11"
          fill="none" stroke="#2563EB" stroke-width="2" stroke-linejoin="round" opacity="0.4"/>
      </svg>
      <h2>공간을 추가해보세요</h2>
      <p>백팩, 서랍, 옷장 — 모든 공간을<br/>레고처럼 직접 설계하세요.</p>
      <button class="btn-primary" onclick="document.getElementById('add-space-btn').click()">첫 공간 만들기</button>
    </div>

    <div class="editor" id="editor" style="display:none">
      <div class="editor-header">
        <div class="editor-header-left">
          <span class="space-emoji-big" id="editor-emoji"></span>
          <div>
            <h1 class="editor-title" id="editor-title" contenteditable="true" spellcheck="false"></h1>
            <p class="editor-meta" id="editor-meta"></p>
          </div>
        </div>
        <div class="editor-header-right">
          <button class="btn-ghost" id="toggle-view-btn">목록 보기</button>
          <button class="btn-ghost" id="delete-space-btn">삭제</button>
        </div>
      </div>

      <div class="canvas-wrapper" id="canvas-wrapper">
        <div class="canvas-hint" id="canvas-hint">셀을 추가하고 자유롭게 배치하세요</div>
        <canvas class="grid-canvas" id="grid-canvas"></canvas>
        <div class="cell-canvas" id="cell-canvas"></div>
        <div class="guide guide-h" id="guide-h"></div>
        <div class="guide guide-v" id="guide-v"></div>
        <button class="add-cell-fab" id="add-cell-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          셀 추가
        </button>
      </div>

      <div class="list-view" id="list-view" style="display:none">
        <table class="list-table">
          <thead><tr><th>아이템</th><th>셀</th><th>수량</th></tr></thead>
          <tbody id="list-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Space Modal -->
  <div class="modal-overlay" id="space-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>새 공간</h3>
        <button class="modal-close" id="space-modal-close">✕</button>
      </div>
      <label>이름</label>
      <input type="text" id="space-name-input" placeholder="예: 여행 백팩, 책상 서랍" />
      <label>종류</label>
      <div class="type-grid" id="type-selector">
        <button class="type-btn active" data-type="bag"    data-emoji="🎒">🎒<span>가방</span></button>
        <button class="type-btn"        data-type="drawer" data-emoji="🗄️">🗄️<span>서랍</span></button>
        <button class="type-btn"        data-type="closet" data-emoji="👕">👕<span>옷장</span></button>
        <button class="type-btn"        data-type="desk"   data-emoji="🖥️">🖥️<span>책상</span></button>
        <button class="type-btn"        data-type="locker" data-emoji="🔒">🔒<span>사물함</span></button>
        <button class="type-btn"        data-type="shelf"  data-emoji="📚">📚<span>선반</span></button>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost"   id="space-modal-cancel">취소</button>
        <button class="btn-primary" id="space-modal-confirm">만들기</button>
      </div>
    </div>
  </div>

  <!-- Cell Modal -->
  <div class="modal-overlay" id="cell-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="cell-modal-title">셀 추가</h3>
        <button class="modal-close" id="cell-modal-close">✕</button>
      </div>
      <label>셀 이름</label>
      <input type="text" id="cell-name-input" placeholder="예: 케이블, 여권, 상의" />
      <label>내용물 <span style="font-weight:300;opacity:.55">(한 줄에 하나)</span></label>
      <textarea id="cell-items-input" placeholder="충전기&#10;이어폰&#10;USB 허브"></textarea>
      <label>색상</label>
      <div class="color-row" id="color-selector">
        <button class="color-swatch active" data-color="blue"   style="background:#DBEAFE;border-color:#93C5FD"></button>
        <button class="color-swatch"        data-color="indigo" style="background:#E0E7FF;border-color:#A5B4FC"></button>
        <button class="color-swatch"        data-color="green"  style="background:#DCFCE7;border-color:#86EFAC"></button>
        <button class="color-swatch"        data-color="amber"  style="background:#FEF3C7;border-color:#FCD34D"></button>
        <button class="color-swatch"        data-color="pink"   style="background:#FCE7F3;border-color:#F9A8D4"></button>
        <button class="color-swatch"        data-color="red"    style="background:#FEE2E2;border-color:#FCA5A5"></button>
        <button class="color-swatch"        data-color="slate"  style="background:#F1F5F9;border-color:#CBD5E1"></button>
      </div>
      <label>아이콘</label>
      <div class="icon-row" id="icon-selector">
        <button class="icon-opt active" data-icon="📦">📦</button>
        <button class="icon-opt" data-icon="🔌">🔌</button>
        <button class="icon-opt" data-icon="👕">👕</button>
        <button class="icon-opt" data-icon="💊">💊</button>
        <button class="icon-opt" data-icon="📄">📄</button>
        <button class="icon-opt" data-icon="💳">💳</button>
        <button class="icon-opt" data-icon="🎧">🎧</button>
        <button class="icon-opt" data-icon="📸">📸</button>
        <button class="icon-opt" data-icon="🧴">🧴</button>
        <button class="icon-opt" data-icon="🔑">🔑</button>
        <button class="icon-opt" data-icon="🍱">🍱</button>
        <button class="icon-opt" data-icon="📚">📚</button>
        <button class="icon-opt" data-icon="👟">👟</button>
        <button class="icon-opt" data-icon="🧢">🧢</button>
        <button class="icon-opt" data-icon="💡">💡</button>
        <button class="icon-opt" data-icon="🛠️">🛠️</button>
      </div>
      <div class="modal-footer">
        <button class="btn-danger-sm" id="cell-delete-btn" style="display:none">삭제</button>
        <div style="display:flex;gap:8px;margin-left:auto">
          <button class="btn-ghost"   id="cell-modal-cancel">취소</button>
          <button class="btn-primary" id="cell-modal-confirm">저장</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
